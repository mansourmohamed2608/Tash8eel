# docker-compose.staging.yml
# Staging deployment manifest.
# Identical to prod but uses :staging image tag and relaxed resource limits.
# Used by .github/workflows/deploy-staging.yml via SSH remote deploy.
#
# Required environment variables (loaded from staging server .env):
#   REGISTRY           - Container registry prefix, e.g. ghcr.io/org
#   IMAGE_TAG          - Git SHA or "staging" tag
#   DATABASE_URL       - Staging PostgreSQL URL (separate DB from production)
#   REDIS_URL          - Staging Redis URL
#   OPENAI_API_KEY     - OpenAI API key (billing alert recommended)
#   ADMIN_API_KEY      - Admin key for staging (different from production)
#   JWT_SECRET         - JWT signing secret
#   JWT_REFRESH_SECRET - JWT refresh secret
#   CORS_ORIGINS       - Staging origins, e.g. https://staging.tash8eel.com
#   NEXTAUTH_SECRET    - NextAuth secret
#   NEXTAUTH_URL       - e.g. https://staging.tash8eel.com
#   NEXT_PUBLIC_API_URL - e.g. https://api.staging.tash8eel.com

services:
  api:
    image: ${REGISTRY}/api:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: "true"
      DATABASE_SSL_REJECT_UNAUTHORIZED: "true"
      REDIS_URL: ${REDIS_URL:-""}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_PRETTY: "false"
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=512"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-""}
      OTEL_SERVICE_NAME: tash8eel-api-staging
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/health'', r => process.exit(r.statusCode === 200 ? 0 : 1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    networks:
      - tash8eel-staging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  worker:
    image: ${REGISTRY}/worker:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: "true"
      DATABASE_SSL_REJECT_UNAUTHORIZED: "true"
      REDIS_URL: ${REDIS_URL:-""}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_PRETTY: "false"
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-10}
      ORCHESTRATOR_CONCURRENCY: ${ORCHESTRATOR_CONCURRENCY:-3}
      WORKER_HEALTH_PORT: 3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      API_BASE_URL: "http://api:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-""}
      OTEL_SERVICE_NAME: tash8eel-worker-staging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3002/health'', r => process.exit(r.statusCode === 200 ? 0 : 1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - tash8eel-staging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  portal:
    image: ${REGISTRY}/portal:${IMAGE_TAG:-staging}
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        API_BASE_URL: "http://api:3000"
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_WS_ENABLED: ${NEXT_PUBLIC_WS_ENABLED:-true}
    restart: unless-stopped
    environment:
      NODE_ENV: production # Next.js requires "production" for optimised build
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      API_BASE_URL: "http://api:3000"
      PORT: 3001
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const req=require(''http'').get(''http://localhost:3001/login'',res=>process.exit(res.statusCode>=200&&res.statusCode<400?0:1));req.setTimeout(4000,()=>req.destroy(new Error(''timeout'')));req.on(''error'',()=>process.exit(1));"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - tash8eel-staging
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

networks:
  tash8eel-staging:
    driver: bridge
    internal: false # Portal must reach out for OAuth; API must reach Neon/OpenAI
