# Test environment for E2E tests
# Usage: docker compose -f docker-compose.test.yml up -d
#        npm -w apps/api run test:e2e
#        docker compose -f docker-compose.test.yml down -v

services:
  # PostgreSQL Test Database with pgvector
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: tash8eel-postgres-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: operations_test
    ports:
      - "5433:5432"
    volumes:
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d operations_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-network
    tmpfs:
      - /var/lib/postgresql/data

  # Redis Test Cache
  redis-test:
    image: redis:7-alpine
    container_name: tash8eel-redis-test
    command: redis-server --appendonly no
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
