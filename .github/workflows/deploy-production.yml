name: Deploy — Production

# Production deploys are MANUAL ONLY.
# Trigger via GitHub Actions UI (workflow_dispatch) after staging validation.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to promote to production (must already be deployed to staging)"
        required: true
        type: string
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

env:
  NODE_VERSION: "20.19.0"
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ You must type DEPLOY in the confirm field to proceed."
            exit 1
          fi
          echo "✅ Confirmation accepted."

      - name: Validate SHA format
        run: |
          if ! echo "${{ inputs.sha }}" | grep -E '^[0-9a-f]{7,40}$'; then
            echo "❌ Invalid SHA format: ${{ inputs.sha }}"
            exit 1
          fi
          echo "✅ SHA looks valid: ${{ inputs.sha }}"

  verify:
    name: Verify Build And TypeScript
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check API
        run: cd apps/api && npx tsc -p tsconfig.json --noEmit

      - name: TypeScript check Worker
        run: cd apps/worker && npx tsc -p tsconfig.json --noEmit

      - name: Build API
        run: npm run build:api

      - name: Build Worker
        run: npm run build:worker

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-inputs, verify]
    environment: production # Requires manual approval in GitHub environment settings
    # Add required reviewers in Settings → Environments → production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      # ── Verify the image for this SHA exists in registry ────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify API image exists for SHA
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/api:${{ inputs.sha }} \
            || (echo "❌ No image found for SHA ${{ inputs.sha }}. Deploy to staging first." && exit 1)
          echo "✅ Image found."

      # ── Record pre-deploy state for rollback ────────────────────────────
      - name: Record current production SHA
        id: prev
        run: |
          PREV=$(docker manifest inspect ${{ env.REGISTRY }}/api:production \
            2>/dev/null | jq -r '.manifests[0].digest // "unknown"' || echo "unknown")
          echo "sha=$PREV" >> $GITHUB_OUTPUT
          echo "Previous production digest: $PREV"

      # ── Promote images to :production tag ───────────────────────────────
      - name: Promote images to :production
        run: |
          for SVC in api worker portal; do
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/$SVC:production \
              ${{ env.REGISTRY }}/$SVC:${{ inputs.sha }}
            echo "✅ Promoted $SVC:${{ inputs.sha }} → $SVC:production"
          done

      # ── Rolling deploy to production ────────────────────────────────────
      - name: Deploy to production via SSH (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/tash8eel
            export IMAGE_TAG=${{ inputs.sha }}
            # Pull new images before stopping old containers to minimize downtime
            docker compose -f docker-compose.prod.yml pull api worker portal
            # Rolling restart with health-check gate
            docker compose -f docker-compose.prod.yml up -d \
              --scale api=2 \
              --no-deps \
              --remove-orphans \
              api
            sleep 10
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps \
              worker portal
            docker image prune -f --filter "until=48h"

      # ── Post-deploy health checks ────────────────────────────────────────
      - name: Wait for production health
        run: |
          echo "Waiting for production to respond..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              ${{ secrets.PRODUCTION_API_URL }}/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production API is up (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
            if [ "$i" = "30" ]; then
              echo "❌ Production did not become healthy — triggering rollback"
              exit 1
            fi
          done

      - name: Production readiness probe
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.PRODUCTION_API_URL }}/ready)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /ready returned $STATUS — triggering rollback"
            exit 1
          fi
          echo "✅ /ready returned 200"

      # ── Rollback on failure ──────────────────────────────────────────────
      - name: Rollback to previous version on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/tash8eel
            echo "⚠️  Deploy failed — rolling back to previous production images..."
            # Docker Compose rolls back to last pulled :production images
            # The previous :production tag was still valid before the promote step
            # so re-pulling with the old digest will restore service.
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps api worker portal
            echo "Rollback attempted. Verify manually: /health and /ready"

      - name: Notify production deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ inputs.sha }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Production deploy SUCCEEDED: SHA=$SHA"
          else
            echo "❌ Production deploy FAILED: SHA=$SHA — rollback attempted"
          fi
          # Optional: post to Slack/Teams/PagerDuty
